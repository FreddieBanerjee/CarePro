<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CarePro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <h1>CarePro</h1>
        <a href="index.html" class="back-link">← Back to Home</a>
    </nav>

    <div style="min-height: calc(100vh - 80px); display: flex; align-items: center; justify-content: center; background: var(--neutral-light);">
        <div style="width: 100%; max-width: 400px; padding: 20px;">
            <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: var(--shadow-lg); border: 1px solid var(--neutral-border);">
                <h2 style="text-align: center; margin-bottom: 10px;">Welcome Back</h2>
                <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px; font-size: 14px;">Sign in to your CarePro account</p>
                
                <form style="display: flex; flex-direction: column; gap: 16px;">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="you@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>

                    <button type="button" onclick="loginUser()" class="btn-large" style="width: 100%; padding: 12px; margin-top: 8px;">Sign In</button>
                </form>

                <p style="text-align: center; color: var(--text-secondary); margin-top: 24px; font-size: 14px;">
                    Don't have an account? 
                    <a href="signup.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create one</a>
                </p>

                <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--neutral-border); text-align: center;">
                    <p style="font-size: 12px; color: var(--text-light); margin: 0;">
                        By signing in, you agree to our 
                        <a href="terms-conditions.html" style="color: var(--primary); text-decoration: none;">Terms & Conditions</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', checkPersistentLogin);
    </script>
</body>
</html>
