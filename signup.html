<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CarePro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <h1>CarePro</h1>
        <a href="index.html" class="back-link">← Back to Home</a>
    </nav>

    <div style="min-height: calc(100vh - 80px); display: flex; align-items: center; justify-content: center; background: var(--neutral-light);">
        <div style="width: 100%; max-width: 450px; padding: 20px;">
            <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: var(--shadow-lg); border: 1px solid var(--neutral-border);">
                <h2 style="text-align: center; margin-bottom: 10px;">Create Your Account</h2>
                <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px; font-size: 14px;">Join CarePro as a parent or babysitter</p>
                
                <form style="display: flex; flex-direction: column; gap: 16px;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="emailAddress" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required onkeyup="checkPasswordStrength()">
                        <div id="passwordStrength" style="height: 4px; background: var(--neutral-border); border-radius: 2px; margin: 8px 0 0 0; display: none;"></div>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label>I am a...</label>
                        <select id="accountRole" required onchange="toggleLocationField()">
                            <option value="">Select account type</option>
                            <option value="parent">Parent looking for childcare</option>
                            <option value="babysitter">Babysitter offering services</option>
                        </select>
                    </div>

                    <div class="form-group" id="locationField" style="display: none;">
                        <label>Location/City</label>
                        <input type="text" id="locationInput" placeholder="Your city or area">
                    </div>

                    <div class="form-group">
                        <label>Address *</label>
                        <input type="text" id="address" placeholder="123 Main Street" required>
                    </div>

                    <div class="form-group">
                        <label>Postcode *</label>
                        <input type="text" id="postcode" placeholder="SW1A 1AA" required onblur="validatePostcode()">
                        <p id="postcodeError" style="color: var(--danger); font-size: 12px; margin: 4px 0 0 0; display: none;">Please enter a valid UK postcode</p>
                    </div>

                    <div class="form-group">
                        <label>Phone Number * (Public - for emergencies)</label>
                        <input type="tel" id="phone" placeholder="+44 123 456 7890" required>
                        <p style="color: var(--text-secondary); font-size: 12px; margin: 4px 0 0 0;">This will be visible to both parents and babysitters for emergency contact</p>
                    </div>

                    <button type="button" onclick="signupUser()" class="btn-large" style="width: 100%; padding: 12px; margin-top: 8px;">Create Account</button>
                </form>

                <p style="text-align: center; color: var(--text-secondary); margin-top: 24px; font-size: 14px;">
                    Already have an account? 
                    <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in</a>
                </p>

                <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--neutral-border); text-align: center;">
                    <p style="font-size: 12px; color: var(--text-light); margin: 0;">
                        By signing up, you agree to our 
                        <a href="terms-conditions.html" style="color: var(--primary); text-decoration: none;">Terms & Conditions</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
    <script>
        function toggleLocationField() {
            const role = document.getElementById('accountRole').value;
            const locationField = document.getElementById('locationField');
            locationField.style.display = role === 'babysitter' ? 'flex' : 'none';
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthBar.style.display = 'none';
                return;
            }
            
            strengthBar.style.display = 'block';
            let strength = 0;
            
            if (password.length >= 6) strength += 25;
            if (password.length >= 8) strength += 25;
            if (/[A-Z]/.test(password)) strength += 25;
            if (/[0-9!@#$%^&*]/.test(password)) strength += 25;
            
            strengthBar.style.width = strength + '%';
            strengthBar.style.background = strength < 50 ? '#ef4444' : strength < 75 ? '#f59e0b' : '#10b981';
        }

        function validatePostcode() {
            const postcode = document.getElementById('postcode').value;
            const postcodeRegex = /^[A-Z]{1,2}\d[A-Z\d]?\s?\d[A-Z]{2}$/i;
            const error = document.getElementById('postcodeError');
            
            if (postcode && !postcodeRegex.test(postcode)) {
                error.style.display = 'block';
            } else {
                error.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', checkPersistentLogin);
    </script>
</body>
</html>
