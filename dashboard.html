<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - CarePro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <h1>CarePro</h1>
        <div>
            <a href="parent-search.html" class="btn-large">Browse Babysitters</a>
            <a href="favorites.html" class="btn-large">⭐ Favorites</a>
            <a href="user-profile.html" class="btn-large">My Profile</a>
            <a href="messaging.html" class="btn-large">Messages</a>
            <button class="logout-btn" onclick="logoutUser()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h2>My Bookings</h2>
        
        <div class="bookings-list">
            <p style="text-align: center; color: var(--text-secondary);">Loading bookings...</p>
        </div>
    </div>

    <!-- Cancellation Modal -->
    <div id="cancelModal" class="modal">
        <div class="modal-content">
            <h2>Cancel Booking</h2>
            <p>Are you sure you want to cancel this booking?</p>
            
            <div class="cancellation-info">
                <h4>Cancellation Policy</h4>
                <p id="policyText"></p>
            </div>
            
            <p style="color: var(--text-secondary); margin: 20px 0;">
                <strong>You will be charged:</strong> <span id="cancellationFee" style="color: var(--danger); font-weight: 700;">£0.00</span>
            </p>
            
            <div class="modal-actions">
                <button class="btn-confirm" id="confirmCancelBtn">Confirm Cancellation</button>
                <button class="btn-cancel" onclick="closeCancelModal()">Keep Booking</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                alert('Please login to view your bookings');
                window.location.href = 'login.html';
                return;
            }

            if (currentUser.role !== 'parent') {
                alert('This page is for parents only');
                window.location.href = 'index.html';
                return;
            }

            loadDashboardBookings();
        });

        function closeCancelModal() {
            document.getElementById('cancelModal').classList.remove('active');
        }
    </script>
</body>
</html>
