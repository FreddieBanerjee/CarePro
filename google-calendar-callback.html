<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting Google Calendar...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #059669 0%, #0f766e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e5e7eb;
            border-top-color: #059669;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h2 {
            margin: 0 0 12px 0;
            color: #1f2937;
            font-size: 20px;
        }

        p {
            margin: 0;
            color: #6b7280;
            font-size: 14px;
            line-height: 1.6;
        }

        .error {
            background: #fee2e2;
            border-left: 4px solid #dc2626;
            padding: 16px;
            border-radius: 6px;
            margin-top: 16px;
            color: #991b1b;
            display: none;
        }

        .error h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            font-weight: 600;
        }

        .error p {
            margin: 0;
            font-size: 13px;
            color: #991b1b;
        }

        .retry-btn {
            margin-top: 16px;
            display: none;
            padding: 12px 24px;
            background: #059669;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .retry-btn:hover {
            background: #047857;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Connecting Google Calendar...</h2>
        <p>Please wait while we authorize your account.</p>
        
        <div class="error" id="errorDiv">
            <h3>Connection Failed</h3>
            <p id="errorMessage"></p>
            <button class="retry-btn" id="retryBtn" onclick="retryConnection()">Try Again</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="google-calendar.js"></script>
    <script>
        // Handle the OAuth callback
        window.addEventListener('load', function() {
            setTimeout(handleGoogleOAuthCallback, 500);
        });

        function retryConnection() {
            window.location.href = 'user-profile.html';
        }

        // Override error display in google-calendar.js
        const originalAlert = window.alert;
        window.alert = function(message, type) {
            if (type === 'error') {
                const errorDiv = document.getElementById('errorDiv');
                const errorMessage = document.getElementById('errorMessage');
                errorMessage.textContent = message;
                errorDiv.style.display = 'block';
                document.querySelector('.spinner').style.display = 'none';
                document.querySelector('h2').style.display = 'none';
                document.querySelector('p').style.display = 'none';
                document.getElementById('retryBtn').style.display = 'inline-block';
            } else {
                originalAlert(message);
            }
        };
    </script>
</body>
</html>
